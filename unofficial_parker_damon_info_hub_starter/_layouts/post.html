---
layout: default
---
<article class="post">
  <header class="page-header">
    <p class="eyebrow">Update</p>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %-d, %Y" }}
      {% if page.status %} · <span class="status status-neutral">{{ page.status }}</span>{% endif %}
    </p>
  </header>
  <div class="prose">
    {{ content }}
  </div>
  <p class="back-link"><a href="{{ '/updates/' | relative_url }}">← All updates</a></p>
</article>
